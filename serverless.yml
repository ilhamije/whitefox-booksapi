service: booksapi

provider:
  name: aws
  runtime: python3.11
  region: us-east-1
  environment:
    ENV: ${sls:stage}
    DYNAMODB_TABLE: ${self:service}-${sls:stage}-books
    APP_REGION: ${self:provider.region}    # renamed from AWS_REGION
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:GetItem
            - dynamodb:Scan
          Resource:
            - !GetAtt BooksTable.Arn
        - Effect: Allow
          Action:
            - logs:CreateLogGroup
            - logs:CreateLogStream
            - logs:PutLogEvents
          Resource:
            - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*"

functions:
  api:
    handler: src/handler.handler
    events:
      - httpApi:
          path: /api/books
          method: POST
      - httpApi:
          path: /api/books/{id}
          method: GET
      - httpApi:
          path: /api/books
          method: GET
      - httpApi:
          path: /docs
          method: GET
      - httpApi:
          path: /openapi.json
          method: GET
      - httpApi:
          path: /
          method: GET

custom:
  pythonRequirements:
    dockerizePip: true
    slim: true

resources:
  Resources:
    BooksTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.DYNAMODB_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: pk
            AttributeType: S
        KeySchema:
          - AttributeName: pk
            KeyType: HASH